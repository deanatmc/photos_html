<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>704-904 | 我們的國中時光紀錄 (管理員版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        // --- 🔑 Supabase 設定區 ---
        const SUPABASE_URL = 'https://piovrdifroesqwozwtnm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_r-d4qj2CE27ZJjMuHEP1uA_7GWFiSp8'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 管理員密碼設定
        const ADMIN_PASSWORD = 'admin04'; 

        // 核心狀態
        let isAdmin = localStorage.getItem('isClassAdmin') === 'true';
        let siteSettings = { siteTitle: "青春編年史", siteSubtitle: "那些年，我們在 04 班一起度過的歲月" };
        let memories = { '704': [], '804': [], '904': [] };
        let capsules = [];
        window.currentBoard = '704';

        // 初始化：從雲端抓取所有資料
        async function initData() {
            try {
                const [memRes, capRes] = await Promise.all([
                    supabase.from('memories').select('*').order('created_at', { ascending: false }),
                    supabase.from('capsules').select('*').order('created_at', { ascending: false })
                ]);
                
                if (memRes.data) {
                    Object.keys(memories).forEach(k => memories[k] = []);
                    memRes.data.forEach(m => {
                        if (memories[m.grade]) memories[m.grade].push(m);
                    });
                }
                if (capRes.data) capsules = capRes.data;

                window.updateUI();
                window.renderBoardGrid();
            } catch (err) {
                console.error("雲端同步失敗:", err);
            }
        }

        // 管理員登入邏輯
        window.tryLogin = function() {
            const pass = prompt("請輸入管理員密碼：");
            if (pass === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem('isClassAdmin', 'true');
                alert("管理員登入成功！現在你可以上傳與刪除資料。");
                location.reload();
            } else if (pass !== null) {
                alert("密碼錯誤！");
            }
        };

        window.logout = function() {
            isAdmin = false;
            localStorage.removeItem('isClassAdmin');
            alert("已登出管理模式。");
            location.reload();
        };

        // UI 更新
        window.updateUI = function() {
            document.getElementById('siteTitle').innerText = siteSettings.siteTitle;
            document.getElementById('siteSubtitle').innerText = siteSettings.siteSubtitle;
            
            // 根據權限顯示/隱藏元素
            const adminTools = document.querySelectorAll('.admin-only');
            adminTools.forEach(el => isAdmin ? el.classList.remove('hidden') : el.classList.add('hidden'));
            
            const loginBtn = document.getElementById('loginStatusBtn');
            loginBtn.innerText = isAdmin ? "管理中 (登出)" : "04";

            window.renderCapsules();
        };

        // 渲染照片牆
        window.renderBoardGrid = function() {
            const grid = document.getElementById('boardGrid');
            if (!grid) return;
            const photos = memories[window.currentBoard] || [];
            
            if (photos.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center"><p class="serif text-slate-400">目前還沒有這段時間的回憶...</p></div>`;
                return;
            }

            grid.innerHTML = photos.map(m => `
                <div class="photo-frame group relative" style="transform: rotate(${(Math.random()*4-2)}deg)">
                    <img src="${m.url}" class="w-full h-auto rounded-sm mb-3 shadow-inner object-cover max-h-80">
                    <p class="text-[11px] font-medium text-slate-600 serif italic">${m.desc || '歲月靜好'}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[8px] text-slate-300">${new Date(m.created_at).toLocaleDateString()}</span>
                        ${isAdmin ? `<button onclick="deleteMemory('${m.id}')" class="text-[8px] text-rose-300 hover:text-rose-500">刪除</button>` : ''}
                    </div>
                </div>
            `).join('');
        };

        // 渲染時光膠囊 (任何人都能看，但只有管理員能刪)
        window.renderCapsules = function() {
            const list = document.getElementById('capsuleList');
            if (!list) return;
            list.innerHTML = capsules.length === 0 
                ? `<p class="text-indigo-300 text-xs italic">還沒有人投遞膠囊...</p>`
                : capsules.map(c => `
                <div class="bg-white/5 border border-white/10 p-5 rounded-2xl hover:bg-white/10 transition group">
                    <p class="text-sm text-indigo-50 leading-relaxed mb-3 italic">"${c.content}"</p>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-[10px] text-indigo-300">@ ${c.name}</span>
                        ${isAdmin ? `<button onclick="deleteCapsule('${c.id}')" class="text-rose-400 text-[10px]">✕</button>` : ''}
                    </div>
                </div>
            `).join('');
        };

        // 上傳與壓縮照片 (僅管理員可執行)
        window.uploadPhotos = async function() {
            if (!isAdmin) return alert("只有管理員可以上傳照片。");
            const files = document.getElementById('photoFile').files;
            const desc = document.getElementById('photoDesc').value;
            const btn = document.getElementById('uploadBtn');
            
            if(!files.length) return alert("請選取照片喔！");
            
            btn.disabled = true;
            btn.innerText = "正在傳送到雲端...";
            
            try {
                for(let f of files) {
                    const reader = new FileReader();
                    const rawUrl = await new Promise(res => {
                        reader.onload = e => res(e.target.result);
                        reader.readAsDataURL(f);
                    });
                    const compressedUrl = await compressImage(rawUrl);
                    
                    const { error } = await supabase.from('memories').insert([
                        { url: compressedUrl, desc: desc, grade: window.currentBoard }
                    ]);
                    if (error) throw error;
                }
                alert("回憶已儲存！");
                document.getElementById('photoFile').value = '';
                document.getElementById('photoDesc').value = '';
                initData();
            } catch (err) {
                alert("上傳失敗，請檢查金鑰或權限設定");
            } finally {
                btn.disabled = false;
                btn.innerText = "上傳回憶";
            }
        };

        // 寄出膠囊 (開放給所有人)
        window.sendCapsule = async function() {
            const name = document.getElementById('capName').value;
            const content = document.getElementById('capText').value;
            if(!name || !content) return alert("名字和內容都要寫喔！");

            const { error } = await supabase.from('capsules').insert([{ name, content }]);
            if (!error) {
                document.getElementById('capName').value = '';
                document.getElementById('capText').value = '';
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
                initData();
            }
        };

        // 刪除功能
        window.deleteMemory = async function(id) {
            if(!isAdmin) return;
            if(!confirm("確定要移除這張照片嗎？")) return;
            await supabase.from('memories').delete().eq('id', id);
            initData();
        };

        window.deleteCapsule = async function(id) {
            if(!isAdmin) return;
            if(!confirm("確定要移除這則留言嗎？")) return;
            await supabase.from('capsules').delete().eq('id', id);
            initData();
        };

        // 圖片壓縮輔助
        async function compressImage(base64) {
            return new Promise(res => {
                const img = new Image(); img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        }

        // 開啟照片牆
        window.openBoard = function(grade) {
            window.currentBoard = grade;
            document.getElementById('modalTitle').innerText = `${grade} 班級回憶牆`;
            document.getElementById('boardModal').classList.remove('hidden');
            window.renderBoardGrid();
        };
        window.closeBoard = () => document.getElementById('boardModal').classList.add('hidden');

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initData();
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfcfd; color: #1e293b; scroll-behavior: smooth; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .hover-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .hover-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.1); }
        .photo-frame { background: white; padding: 0.8rem 0.8rem 2.5rem 0.8rem; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        .corkboard { background: #fdf6e3; background-image: radial-gradient(#dcd5c1 1px, transparent 0); background-size: 24px 24px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

    <!-- 頂部導覽列 -->
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 h-16 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <!-- 點擊此按鈕觸發登入/登出 -->
            <button id="loginStatusBtn" onclick="isAdmin ? logout() : tryLogin()" class="w-12 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-[10px] hover:bg-indigo-700 transition">04</button>
            <span class="serif font-black text-lg text-slate-800 tracking-tighter">704-904 青春紀事</span>
        </div>
        <div class="flex space-x-4 md:space-x-8">
            <button onclick="openBoard('704')" class="text-[10px] font-black text-slate-500 hover:text-indigo-600 uppercase tracking-widest">704牆</button>
            <button onclick="openBoard('804')" class="text-[10px] font-black text-slate-500 hover:text-indigo-600 uppercase tracking-widest">804牆</button>
            <button onclick="openBoard('904')" class="text-[10px] font-black text-slate-500 hover:text-indigo-600 uppercase tracking-widest">904牆</button>
        </div>
    </nav>

    <!-- 英雄區頭部 -->
    <header class="py-32 px-6 text-center relative bg-slate-900 text-white overflow-hidden">
        <div class="absolute inset-0 opacity-30 bg-[url('https://images.unsplash.com/photo-1523050853064-060477114b7f?auto=format&fit=crop&q=80')] bg-cover bg-center"></div>
        <div class="relative z-10">
            <h1 id="siteTitle" class="serif text-5xl md:text-7xl font-black mb-6 tracking-tight">青春編年史</h1>
            <p id="siteSubtitle" class="text-indigo-200 text-lg md:text-xl font-light italic">那些年，我們在 04 班一起度過的歲月</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <!-- 核心章節卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-32 reveal">
            <div class="hover-card bg-white p-10 rounded-[2.5rem] cursor-pointer" onclick="openBoard('704')">
                <div class="w-14 h-14 bg-blue-500 rounded-2xl flex items-center justify-center text-white font-black mb-8 shadow-lg shadow-blue-100">7</div>
                <h3 class="serif text-2xl font-bold mb-4 text-slate-800">啟程：七年級</h3>
                <p class="text-slate-400 text-xs leading-relaxed">帶著青澀的書包，我們在這裡第一次交換姓名...</p>
            </div>
            <div class="hover-card bg-white p-10 rounded-[2.5rem] cursor-pointer" onclick="openBoard('804')">
                <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center text-white font-black mb-8 shadow-lg shadow-emerald-100">8</div>
                <h3 class="serif text-2xl font-bold mb-4 text-slate-800">蛻變：八年級</h3>
                <p class="text-slate-400 text-xs leading-relaxed">在操場的吶喊中，我們開始懂得什麼是團體...</p>
            </div>
            <div class="hover-card bg-white p-10 rounded-[2.5rem] cursor-pointer" onclick="openBoard('904')">
                <div class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center text-white font-black mb-8 shadow-lg shadow-orange-100">9</div>
                <h3 class="serif text-2xl font-bold mb-4 text-slate-800">奔向：九年級</h3>
                <p class="text-slate-400 text-xs leading-relaxed">最後的一百天，我們約定好在未來更高處見面...</p>
            </div>
        </div>

        <!-- 時光膠囊區 (留言功能開放給所有人) -->
        <section id="capsule-section" class="reveal">
            <div class="bg-indigo-950 rounded-[4rem] p-10 md:p-16 text-white grid grid-cols-1 lg:grid-cols-3 gap-16 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-20 opacity-5 text-[15rem] serif">✉</div>
                <div class="lg:col-span-1 relative z-10">
                    <h2 class="serif text-4xl font-black mb-8">時光膠囊</h2>
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold ml-1">誰的來信</label>
                            <input type="text" id="capName" placeholder="輸入你的暱稱" class="w-full bg-white/10 border border-white/10 rounded-2xl px-6 py-4 text-sm outline-none focus:bg-white/20 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold ml-1">想說的話</label>
                            <textarea id="capText" placeholder="寫給未來的我們..." rows="5" class="w-full bg-white/10 border border-white/10 rounded-2xl px-6 py-4 text-sm outline-none focus:bg-white/20 transition resize-none"></textarea>
                        </div>
                        <button onclick="sendCapsule()" class="w-full bg-white text-indigo-900 font-black py-4 rounded-2xl hover:bg-indigo-50 transition shadow-xl shadow-indigo-900/20">投遞膠囊</button>
                    </div>
                </div>
                <div id="capsuleList" class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[500px] overflow-y-auto no-scrollbar pr-4"></div>
            </div>
        </section>
    </main>

    <!-- 回憶牆彈窗 -->
    <div id="boardModal" class="fixed inset-0 z-50 hidden bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-6xl h-[90vh] rounded-[3rem] overflow-hidden flex flex-col shadow-2xl relative">
            <div class="px-10 py-8 flex justify-between items-center bg-indigo-600 text-white">
                <div class="flex items-center space-x-3">
                    <div class="w-3 h-3 bg-red-400 rounded-full"></div>
                    <h2 id="modalTitle" class="serif text-2xl font-black">回憶牆</h2>
                </div>
                <button onclick="closeBoard()" class="w-12 h-12 hover:bg-white/10 rounded-full flex items-center justify-center text-xl transition">✕</button>
            </div>
            
            <div class="flex-1 overflow-y-auto corkboard p-8 md:p-16">
                <!-- 上傳區 (僅管理員顯示) -->
                <div class="admin-only hidden mb-16 bg-white/80 backdrop-blur p-8 rounded-3xl border border-indigo-100 flex flex-col md:flex-row gap-6 items-center shadow-sm">
                    <div class="flex-1 w-full text-center md:text-left">
                        <p class="text-indigo-600 font-bold text-xs mb-2">管理員模式：新增回憶</p>
                        <input type="text" id="photoDesc" placeholder="為這張照片寫一句話..." class="w-full border-b-2 border-slate-100 py-3 text-sm outline-none focus:border-indigo-500 transition px-2">
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <input type="file" id="photoFile" accept="image/*" multiple class="text-[10px] text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                        <button id="uploadBtn" onclick="uploadPhotos()" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black text-xs whitespace-nowrap hover:bg-indigo-700 transition">上傳回憶</button>
                    </div>
                </div>

                <!-- 照片展示區 -->
                <div id="boardGrid" class="columns-1 sm:columns-2 lg:columns-3 gap-10 space-y-10 pb-20"></div>
            </div>
        </div>
    </div>

    <footer class="py-20 border-t border-slate-100 bg-white">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <p class="serif text-slate-800 font-bold text-xl mb-4">我們在 04 班的每一天，都值得被記錄。</p>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.3em] uppercase tracking-widest">Graduation is not the end, it's just a pause.</p>
        </div>
    </footer>

</body>
</html>
