<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>704-904 | 我們的國中時光紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入芫荽體 Iansui -->
    <link href="https://cdn.jsdelivr.net/npm/iansui/iansui.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Iansui', cursive, sans-serif;
            background-color: #fdfeff;
            scroll-behavior: smooth;
            /* 核心修復：防止水平滾動 */
            overflow-x: hidden;
            width: 100%;
            position: relative;
            word-wrap: break-word;
            word-break: break-word;
        }

        /* 華麗背景流光特效 */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(245, 158, 11, 0.05) 0%, transparent 60%);
        }

        .bg-glow::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
            opacity: 0.15;
            pointer-events: none;
        }

        .serif { font-family: 'Iansui', cursive, serif; }

        /* 行政區塊隱藏邏輯 */
        .admin-section { display: none !important; }
        body.is-admin .admin-section { display: block !important; }

        /* 強化玻璃擬態 */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* 班級卡片進階特效 */
        .entry-card {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @media (min-width: 768px) {
            .entry-card:hover {
                transform: translateY(-15px) scale(1.05);
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.25);
                border-color: rgba(99, 102, 241, 0.4);
            }
        }

        /* 連結卡片特效 */
        .link-card {
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* 動態進場動畫 */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .corkboard {
            background: #fdf2f2;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 修正彈窗在手機上的高度問題 */
        #boardModal {
            padding: 0 !important;
        }
        @media (min-width: 768px) {
            #boardModal { padding: 2rem !important; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="bg-glow"></div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-white/40">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 md:h-20 flex items-center justify-between">
            <div class="flex items-center space-x-2 md:space-x-3 group cursor-pointer">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-lg md:rounded-xl flex items-center justify-center text-white font-black shadow-lg">04</div>
                <span class="serif font-black text-lg md:text-2xl text-gray-800 tracking-tighter">CHRONICLE</span>
            </div>
            <div class="flex items-center space-x-2 md:space-x-6">
                <button onclick="openLogin()" id="loginBtn" class="text-[9px] md:text-[10px] font-black tracking-widest text-gray-400 hover:text-indigo-600 transition uppercase">Master Key</button>
                <button onclick="logout()" class="admin-section bg-red-500 text-white text-[9px] md:text-[10px] px-3 py-1.5 md:px-4 md:py-2 rounded-full font-black shadow-xl uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </nav>

    <header class="relative py-20 md:py-48 px-6 text-center text-white min-h-[400px] md:min-h-[700px] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img id="bannerImg" src="https://images.unsplash.com/photo-1523050853063-bd8012fbb230?auto=format&fit=crop&q=80" class="w-full h-full object-cover scale-110 blur-[1px]">
            <div class="absolute inset-0 bg-gradient-to-b from-indigo-950/80 via-indigo-950/40 to-transparent"></div>
        </div>
        <div class="relative z-10 w-full max-w-4xl">
            <div class="inline-flex items-center space-x-2 px-4 py-1.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 mb-6">
                <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
                <span class="text-[9px] md:text-xs font-black tracking-[0.2em] uppercase">Archive System 04</span>
            </div>
            <!-- 關鍵修復：手機標題字體大小從 5xl 下調至 4xl，防止超出 -->
            <h1 class="serif text-4xl sm:text-5xl md:text-7xl lg:text-9xl font-black mb-4 md:mb-8 tracking-tighter drop-shadow-2xl leading-tight md:leading-none">青春編年史</h1>
            <p class="text-white text-sm md:text-2xl font-light tracking-[0.1em] md:tracking-[0.2em] opacity-90">那些瞬間，定格成永恆的畫面</p>
            
            <div class="admin-section mt-8 md:mt-16">
                <label class="bg-indigo-600 hover:bg-indigo-700 cursor-pointer px-6 md:px-10 py-3 md:py-4 rounded-full text-[10px] md:text-sm font-black transition-all shadow-2xl inline-block border border-indigo-400/50 uppercase tracking-widest">
                    ✨ Update Atmosphere <input type="file" id="bannerInput" accept="image/*" class="hidden" onchange="updateBanner(this)">
                </label>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 md:px-8 py-12 md:py-24">
        <!-- 班級列表：手機版下邊距縮小 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-12 mb-20 md:mb-40">
            <!-- 7年級 -->
            <div onclick="openBoard('704')" class="reveal entry-card glass-card cursor-pointer p-8 md:p-12 rounded-[2rem] md:rounded-[4rem] group relative overflow-hidden">
                <div class="icon-box w-16 h-16 md:w-24 md:h-24 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-2xl md:rounded-[2rem] flex items-center justify-center text-3xl md:text-5xl font-black mb-6 shadow-xl">7</div>
                <h3 class="serif text-2xl md:text-4xl font-black text-gray-800">七年四班</h3>
                <p class="text-gray-500 text-xs md:text-base mt-3 leading-relaxed font-light">那一年的蟬鳴，開啟了我們的故事。</p>
            </div>
            <!-- 8年級 -->
            <div onclick="openBoard('804')" class="reveal entry-card glass-card cursor-pointer p-8 md:p-12 rounded-[2rem] md:rounded-[4rem] group relative overflow-hidden">
                <div class="icon-box w-16 h-16 md:w-24 md:h-24 bg-gradient-to-br from-green-500 to-teal-600 text-white rounded-2xl md:rounded-[2rem] flex items-center justify-center text-3xl md:text-5xl font-black mb-6 shadow-xl">8</div>
                <h3 class="serif text-2xl md:text-4xl font-black text-gray-800">八年四班</h3>
                <p class="text-gray-500 text-xs md:text-base mt-3 leading-relaxed font-light">在瘋狂與汗水中，我們找到了彼此的共鳴。</p>
            </div>
            <!-- 9年級 -->
            <div onclick="openBoard('904')" class="reveal entry-card glass-card cursor-pointer p-8 md:p-12 rounded-[2rem] md:rounded-[4rem] group relative overflow-hidden">
                <div class="icon-box w-16 h-16 md:w-24 md:h-24 bg-gradient-to-br from-orange-500 to-red-600 text-white rounded-2xl md:rounded-[2rem] flex items-center justify-center text-3xl md:text-5xl font-black mb-6 shadow-xl">9</div>
                <h3 class="serif text-2xl md:text-4xl font-black text-gray-800">九年四班</h3>
                <p class="text-gray-500 text-xs md:text-base mt-3 leading-relaxed font-light">離別不是終點，而是下一個編年史的起點。</p>
            </div>
        </div>

        <!-- 常用連結 -->
        <section class="mb-20 md:mb-48">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 md:mb-16 space-y-4 md:space-y-0">
                <div class="flex items-center space-x-4">
                    <div class="w-1.5 h-8 md:h-12 bg-gradient-to-b from-indigo-600 to-purple-600 rounded-full shadow-lg"></div>
                    <h2 class="serif text-3xl md:text-6xl font-black text-gray-800 tracking-tighter">常用連結</h2>
                </div>
                <button onclick="toggleLinkEditor()" class="admin-section self-start md:self-auto bg-white/40 border border-indigo-100 px-5 py-2 rounded-xl text-[10px] font-black text-indigo-600 uppercase tracking-widest">Edit Links</button>
            </div>
            
            <div id="linkEditor" class="hidden mb-8 glass-card p-6 md:p-12 rounded-[2rem] border-2 border-dashed border-indigo-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="newLinkTitle" placeholder="連結名稱" class="w-full p-4 rounded-xl bg-white outline-none">
                    <input type="text" id="newLinkUrl" placeholder="https://..." class="w-full p-4 rounded-xl bg-white outline-none">
                </div>
                <button onclick="saveNewLink()" class="w-full bg-gray-900 text-white font-black py-4 rounded-xl shadow-xl uppercase tracking-widest text-xs">Append to Cloud</button>
            </div>
            
            <div id="linksList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8"></div>
        </section>
    </main>

    <!-- 回憶牆彈窗 -->
    <div id="boardModal" class="fixed inset-0 z-[60] hidden bg-indigo-950/30 backdrop-blur-2xl flex items-center justify-center">
        <div class="bg-white w-full h-full md:h-[90vh] md:w-[90vw] md:max-w-7xl md:rounded-[3rem] overflow-hidden flex flex-col shadow-2xl transition-all opacity-0 duration-500" id="modalContent">
            <div class="px-6 md:px-10 py-4 md:py-8 flex justify-between items-center border-b border-gray-100 bg-white/80">
                <div class="flex items-center space-x-3 md:space-x-5">
                    <div id="modalIcon" class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gray-900 text-white flex items-center justify-center font-black text-lg shadow-lg">#</div>
                    <h2 id="modalTitle" class="serif text-xl md:text-3xl font-black text-gray-800">相簿瀏覽</h2>
                </div>
                <button onclick="closeBoard()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-all">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto corkboard p-6 md:p-12">
                <div class="admin-section mb-8 max-w-2xl mx-auto glass-card p-6 md:p-10 rounded-[2rem] text-center">
                    <input type="file" id="fileInput" accept="image/*" multiple class="block w-full text-[10px] mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 file:font-black">
                    <button onclick="submitMultipleItems()" id="uploadBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest text-xs">Start Uploading</button>
                    <div id="uploadProgress" class="hidden mt-4 text-[10px] font-black text-indigo-500 animate-pulse tracking-[0.2em]">SYNCING...</div>
                </div>
                
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8" id="boardGrid"></div>
            </div>
        </div>
    </div>

    <!-- 驗證彈窗 -->
    <div id="loginModal" class="fixed inset-0 z-[100] hidden bg-indigo-950/40 backdrop-blur-2xl flex items-center justify-center p-6">
        <div class="bg-white p-8 md:p-12 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <h3 class="serif text-2xl md:text-3xl font-black mb-6 text-gray-800">管理驗證</h3>
            <input type="password" id="adminPass" placeholder="••••" class="w-full bg-gray-50 p-4 rounded-xl mb-6 text-center text-3xl outline-none focus:ring-2 focus:ring-indigo-200 font-black">
            <button onclick="verifyLogin()" class="w-full bg-gray-900 text-white py-4 rounded-xl font-black shadow-lg mb-4 text-sm uppercase tracking-widest">Confirm</button>
            <button onclick="closeLogin()" class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <footer class="py-16 md:py-32 text-center opacity-40 px-6">
        <p class="text-gray-900 text-[9px] md:text-[10px] font-black tracking-[0.3em] md:tracking-[0.6em] uppercase">Chronicle Archive v3.5 • Memory is Eternity</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://huvoykalbkamobcwhvrl.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dm95a2FsYmthbW9iY3dodnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTIxMTEsImV4cCI6MjA5MjI2ODExMX0.oa_7N40X-fV0Um47F5W_A7r_LCpua_A0H8bp900B1qg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentGrade = '';
        let memoryData = {'704':[], '804':[], '904':[]};

        function handleScroll() {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 50) el.classList.add('active');
            });
        }
        window.addEventListener('scroll', handleScroll);

        async function fetchAllData() {
            try {
                const { data: mems } = await _supabase.from('memories').select('*').order('created_at', { ascending: false });
                if (mems) {
                    memoryData = {'704':[], '804':[], '904':[]};
                    mems.forEach(m => { if(memoryData[m.grade]) memoryData[m.grade].push(m); });
                }
                const { data: links } = await _supabase.from('links').select('*').order('created_at', { ascending: false });
                if (links) renderLinks(links);

                const { data: banner } = _supabase.storage.from('photos').getPublicUrl('site_banner.jpg');
                if(banner) document.getElementById('bannerImg').src = banner.publicUrl + '?t=' + Date.now();
                
                if(currentGrade) renderGrid();
                handleScroll();
            } catch (err) { console.error("Sync Failed", err); }
        }

        async function updateBanner(input) {
            const file = input.files[0];
            if (!file) return;
            await _supabase.storage.from('photos').upload('site_banner.jpg', file, { upsert: true });
            location.reload();
        }

        async function saveNewLink() {
            const title = document.getElementById('newLinkTitle').value.trim();
            const url = document.getElementById('newLinkUrl').value.trim();
            if(!title || !url) return;
            await _supabase.from('links').insert([{ title, url }]);
            fetchAllData();
            document.getElementById('linkEditor').classList.add('hidden');
        }

        function renderLinks(links) {
            const container = document.getElementById('linksList');
            container.innerHTML = links.map(link => `
                <div class="link-card glass-card p-5 md:p-7 rounded-2xl md:rounded-[2rem] flex items-center justify-between group">
                    <a href="${link.url}" target="_blank" class="font-black text-gray-800 truncate text-[11px] md:text-sm hover:text-indigo-600 transition-colors uppercase tracking-tight">${link.title}</a>
                    <button onclick="deleteLink('${link.id}')" class="admin-section text-red-400 hover:text-red-600 text-xs ml-2">✕</button>
                </div>
            `).join('');
        }

        async function deleteLink(id) {
            if(!confirm('刪除連結？')) return;
            await _supabase.from('links').delete().eq('id', id);
            fetchAllData();
        }

        function renderGrid() {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = (memoryData[currentGrade] || []).map((item, idx) => `
                <div class="bg-white p-2 md:p-4 shadow-lg transition-all duration-500" style="transform: rotate(${(Math.random()*2-1).toFixed(1)}deg)">
                    <div class="overflow-hidden aspect-square mb-2">
                        <img src="${item.url}" class="w-full h-full object-cover cursor-zoom-in" onclick="window.open('${item.url}', '_blank')">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[8px] md:text-[10px] font-black text-indigo-300 italic uppercase">#${memoryData[currentGrade].length - idx}</span>
                        <button onclick="deleteItem('${item.id}')" class="admin-section bg-red-500 text-white w-4 h-4 rounded-full text-[8px]">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function submitMultipleItems() {
            const files = document.getElementById('fileInput').files;
            if (!files.length) return;
            document.getElementById('uploadProgress').classList.remove('hidden');
            for (let file of files) {
                const path = `img_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
                const { error: upErr } = await _supabase.storage.from('photos').upload(path, file);
                if (!upErr) {
                    const { data } = _supabase.storage.from('photos').getPublicUrl(path);
                    await _supabase.from('memories').insert([{ grade: currentGrade, url: data.publicUrl }]);
                }
            }
            document.getElementById('uploadProgress').classList.add('hidden');
            fetchAllData();
        }

        async function deleteItem(id) {
            if(!confirm('刪除照片？')) return;
            await _supabase.from('memories').delete().eq('id', id);
            fetchAllData();
        }

        function openBoard(grade) { 
            currentGrade = grade; 
            document.getElementById('modalTitle').innerText = `${grade} ARCHIVE`; 
            document.getElementById('modalIcon').innerText = grade.charAt(0);
            const modal = document.getElementById('boardModal');
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('modalContent').classList.replace('opacity-0', 'opacity-100'), 50);
            renderGrid(); 
        }

        function closeBoard() {
            document.getElementById('modalContent').classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => document.getElementById('boardModal').classList.add('hidden'), 500);
        }

        function openLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }
        function verifyLogin() { 
            if(document.getElementById('adminPass').value === 'admin04') { 
                document.body.classList.add('is-admin'); closeLogin(); 
            } else { alert('驗證錯誤'); } 
        }
        function logout() { location.reload(); }
        function toggleLinkEditor() { document.getElementById('linkEditor').classList.toggle('hidden'); }

        window.onload = fetchAllData;
    </script>
</body>
</html>
