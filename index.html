<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>704-904 | 我們的國中時光紀錄 (多檔案修正版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {--primary:#4f46e5;--accent:#f59e0b;}
        body{font-family:'Noto Sans TC',sans-serif;background-color:#f8fafc;scroll-behavior:smooth;}
        .serif{font-family:'Noto Serif TC',serif;}
        .grid-bg{background-image:linear-gradient(#e2e8f0 1px,transparent 1px),linear-gradient(90deg,#e2e8f0 1px,transparent 1px);background-size:30px 30px;}
        
        /* 核心修正：管理員權限控制樣式 */
        .admin-section { display: none !important; }
        body.is-admin .admin-section { display: block !important; }
        body.is-admin .admin-inline { display: inline-flex !important; }

        .corkboard{background-color:#dcb382;background-image:url("https://www.transparenttextures.com/patterns/cork-board.png");}
        .photo-frame{transition:transform .3s cubic-bezier(0.175,0.885,0.32,1.275); break-inside: avoid;}
        .photo-frame:hover{transform:scale(1.05) rotate(0deg)!important;z-index:10;}
        .capsule-card{background:linear-gradient(135deg,#fff 0%,#f3f4f6 100%);border-left:5px solid #6366f1;}
    </style>
</head>
<body class="grid-bg">
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2"><span class="serif font-black text-xl text-indigo-600 tracking-tighter">CLASS 04</span></div>
            <div class="flex items-center space-x-4">
                <button onclick="openLogin()" id="loginBtn" class="text-xs font-bold text-gray-400 hover:text-indigo-600">管理登入</button>
                <button onclick="logout()" class="admin-section admin-inline bg-red-500 text-white text-[10px] px-3 py-1 rounded-full font-bold">登出模式</button>
            </div>
        </div>
    </nav>

    <header class="py-20 px-6 text-center bg-indigo-950 text-white">
        <h1 class="serif text-5xl md:text-7xl font-black mb-4">青春編年史</h1>
        <p class="text-indigo-200">雲端同步系統 (管理員：admin04)</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
            <div onclick="openBoard('704')" class="cursor-pointer bg-white p-8 rounded-[2.5rem] shadow-xl border hover:-translate-y-2 transition-all text-center">
                <div class="w-14 h-14 bg-blue-500 rounded-2xl flex items-center justify-center text-white text-2xl font-black mb-6 mx-auto">7</div>
                <h3 class="serif text-2xl font-bold">704 回憶牆</h3>
            </div>
            <div onclick="openBoard('804')" class="cursor-pointer bg-white p-8 rounded-[2.5rem] shadow-xl border hover:-translate-y-2 transition-all text-center">
                <div class="w-14 h-14 bg-green-500 rounded-2xl flex items-center justify-center text-white text-2xl font-black mb-6 mx-auto">8</div>
                <h3 class="serif text-2xl font-bold">804 回憶牆</h3>
            </div>
            <div onclick="openBoard('904')" class="cursor-pointer bg-white p-8 rounded-[2.5rem] shadow-xl border hover:-translate-y-2 transition-all text-center">
                <div class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center text-white text-2xl font-black mb-6 mx-auto">9</div>
                <h3 class="serif text-2xl font-bold">904 回憶牆</h3>
            </div>
        </div>

        <section id="time-capsule">
            <h2 class="serif text-4xl font-black text-center mb-10">時光膠囊</h2>
            <div id="capsuleList" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10"></div>
            <div class="bg-white p-8 rounded-3xl shadow-xl max-w-xl mx-auto">
                <div class="space-y-4">
                    <input type="text" id="capsuleName" placeholder="你的暱稱" class="w-full border p-4 rounded-xl outline-none">
                    <textarea id="capsuleText" rows="3" placeholder="留下祝福..." class="w-full border p-4 rounded-xl outline-none"></textarea>
                    <button onclick="submitCapsule()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">發送留言</button>
                </div>
            </div>
        </section>
    </main>

    <div id="boardModal" class="fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-6xl h-[90vh] rounded-[3rem] overflow-hidden flex flex-col">
            <div class="p-6 flex justify-between items-center text-white bg-indigo-600">
                <h2 id="modalTitle" class="serif text-2xl font-black italic">回憶牆</h2>
                <button onclick="closeBoard()" class="text-2xl">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto corkboard p-6">
                <div class="admin-section mb-10 max-w-md mx-auto bg-white/95 p-6 rounded-3xl border-2 border-indigo-100 shadow-lg">
                    <h4 class="font-bold text-indigo-600 mb-4 text-center">📸 批量上傳照片</h4>
                    <div class="space-y-4">
                        <input type="file" id="fileInput" accept="image/*" multiple class="w-full text-sm">
                        <input type="text" id="descInput" placeholder="這批照片的共同描述..." class="w-full border p-2 rounded-xl text-sm outline-none">
                        <button onclick="submitMultipleItems()" id="uploadBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">開始批量同步</button>
                        <div id="uploadStatus" class="text-xs text-center font-bold text-indigo-500 hidden"></div>
                    </div>
                </div>
                <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6" id="boardGrid"></div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 z-[60] hidden bg-indigo-950/90 flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-xs text-center">
            <h3 class="serif text-xl font-bold mb-6">管理員驗證</h3>
            <input type="password" id="adminPass" placeholder="請輸入密碼" class="w-full border p-3 rounded-xl mb-4 text-center">
            <button onclick="verifyLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">登入</button>
            <button onclick="closeLogin()" class="block w-full mt-4 text-gray-400 text-xs">關閉</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://huvoykalbkamobcwhvrl.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dm95a2FsYmthbW9iY3dodnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTIxMTEsImV4cCI6MjA5MjI2ODExMX0.oa_7N40X-fV0Um47F5W_A7r_LCpua_A0H8bp900B1qg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentGrade = '';
        let memoryData = {'704':[], '804':[], '904':[]};

        // --- 登入邏輯修正 ---
        function verifyLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'admin04') {
                document.body.classList.add('is-admin');
                alert('管理員登入成功！現在可以進行批量上傳與刪除。');
                closeLogin();
                if(currentGrade) renderGrid(); // 重新渲染以顯示隱藏按鈕
            } else { 
                alert('密碼錯誤！請重新輸入。'); 
            }
        }
        function logout() { document.body.classList.remove('is-admin'); alert('已退回學生模式'); if(currentGrade) renderGrid(); }

        // --- 批量上傳邏輯 ---
        async function submitMultipleItems() {
            const files = document.getElementById('fileInput').files;
            const desc = document.getElementById('descInput').value;
            const btn = document.getElementById('uploadBtn');
            const statusDiv = document.getElementById('uploadStatus');

            if (files.length === 0) return alert('請先選擇至少一張照片');

            btn.disabled = true;
            statusDiv.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusDiv.innerText = `正在處理第 ${i+1}/${files.length} 張...`;
                try {
                    const fileExt = file.name.split('.').pop();
                    const safeName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    const { error: sErr } = await _supabase.storage.from('photos').upload(safeName, file);
                    if (sErr) throw sErr;
                    const { data: urlData } = _supabase.storage.from('photos').getPublicUrl(safeName);
                    await _supabase.from('memories').insert([{
                        grade: currentGrade, url: urlData.publicUrl, desc: desc || '一段美好的回憶', date: new Date().toLocaleDateString()
                    }]);
                } catch (e) { alert(`第 ${i+1} 張上傳出錯: ${e.message}`); }
            }
            alert('所有照片已同步至雲端！');
            document.getElementById('fileInput').value = '';
            btn.disabled = false;
            statusDiv.classList.add('hidden');
            fetchAllData();
        }

        // --- 資料同步與渲染 ---
        async function fetchAllData() {
            const { data: memories } = await _supabase.from('memories').select('*').order('created_at', { ascending: false });
            if (memories) {
                memoryData = {'704':[], '804':[], '904':[]};
                memories.forEach(m => { if(memoryData[m.grade]) memoryData[m.grade].push(m); });
            }
            const { data: capsules } = await _supabase.from('capsules').select('*').order('created_at', { ascending: false });
            if (capsules) renderCapsules(capsules);
            if(currentGrade) renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = '';
            const items = memoryData[currentGrade] || [];
            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'photo-frame bg-white p-3 shadow-xl relative w-full';
                card.style.transform = `rotate(${(Math.random()*4-2)}deg)`;
                card.innerHTML = `
                    <img src="${item.url}" class="w-full h-auto mb-2 pointer-events-none" loading="lazy">
                    <p class="text-[10px] font-bold text-gray-500">${item.desc}</p>
                    <button onclick="deleteItem('${item.id}')" class="admin-section absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-[10px] flex items-center justify-center">✕</button>
                `;
                grid.appendChild(card);
            });
        }

        async function deleteItem(id) {
            if(!confirm('確定要從雲端永久刪除嗎？')) return;
            await _supabase.from('memories').delete().eq('id', id);
            fetchAllData();
        }

        async function submitCapsule() {
            const name = document.getElementById('capsuleName').value || '同學';
            const text = document.getElementById('capsuleText').value;
            if(!text) return alert('請填寫內容');
            await _supabase.from('capsules').insert([{ name, text, time: new Date().toLocaleString() }]);
            document.getElementById('capsuleText').value = '';
            fetchAllData();
        }

        function renderCapsules(data) {
            document.getElementById('capsuleList').innerHTML = data.map(item => `
                <div class="capsule-card p-5 shadow-md bg-white relative">
                    <p class="text-xs font-bold text-indigo-600 mb-2">${item.name}</p>
                    <p class="text-sm text-gray-600">${item.text}</p>
                    <button onclick="deleteCapsule('${item.id}')" class="admin-section absolute top-2 right-2 text-red-400">✕</button>
                </div>
            `).join('');
        }

        async function deleteCapsule(id) {
            if(!confirm('刪除這條留言？')) return;
            await _supabase.from('capsules').delete().eq('id', id);
            fetchAllData();
        }

        function openBoard(grade) { currentGrade = grade; document.getElementById('modalTitle').innerText = `${grade} 精彩瞬間`; document.getElementById('boardModal').classList.remove('hidden'); renderGrid(); }
        function closeBoard() { document.getElementById('boardModal').classList.add('hidden'); }
        function openLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }

        fetchAllData();
    </script>
</body>
</html>
