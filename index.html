<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>704-904 | 我們的國中時光紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, query, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- GitHub 部署手動設定區 ---
        // 如果你在 GitHub 上執行，請到 Firebase 控制台複製你的 SDK 設定貼在下方
        // 如果是在此預覽環境，則會自動使用 __firebase_config
        const fallbackConfig = {
            apiKey: "你的API_KEY",
            authDomain: "你的專案ID.firebaseapp.com",
            projectId: "你的專案ID",
            storageBucket: "你的專案ID.firebasestorage.app",
            messagingSenderId: "你的發送者ID",
            appId: "你的APP_ID"
        };

        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
        } catch (e) {
            firebaseConfig = fallbackConfig;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-class-memories'; 
        // --------------------------

        // 核心狀態管理
        let siteSettings = {
            siteTitle: "青春編年史",
            siteSubtitle: "那些年，我們在 04 班一起度過的歲月",
            card7Title: "啟程：704", card7Desc: "那年夏天，我們帶著青澀的笑容第一次遇見...",
            card8Title: "熱血：804", card8Desc: "操場上的吶喊、比賽的汗水，都是成長的印記...",
            card9Title: "承諾：904", card9Desc: "最後的一年，所有的不捨都化作邁向未來的力量..."
        };
        let memories = { '704': [], '804': [], '904': [], '隱藏回憶': [] };
        let capsules = [];
        let videos = [{ id: 1, title: "全班最難忘的瞬間", url: "https://www.youtube.com/embed/dQw4w9WgXcQ" }];
        let user = null;

        window.updateUI = function() {
            Object.keys(siteSettings).forEach(id => { 
                const el = document.getElementById(id);
                if(el) el.innerText = siteSettings[id]; 
            });
            if (typeof window.renderVideos === 'function') window.renderVideos();
            if (typeof window.renderCapsules === 'function') window.renderCapsules();
        };

        const initAuth = async () => {
            try {
                // 如果是在外部環境（如 GitHub），通常沒有 __initial_auth_token，直接使用匿名登入
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed", error);
                alert("資料庫連接失敗，請確認 Firebase 設定是否正確。");
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) setupSync();
        });

        initAuth();

        function setupSync() {
            if (!user) return;
            
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main'), (s) => {
                if (s.exists()) { 
                    siteSettings = { ...siteSettings, ...s.data() }; 
                    window.updateUI(); 
                } else { saveSettings(); }
            }, (err) => console.error("Settings sync error", err));

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'misc', 'content'), (s) => {
                if (s.exists()) { 
                    const data = s.data();
                    window.videos = data.videos || videos;
                    window.capsules = data.capsules || [];
                    window.updateUI(); 
                } else { saveMisc(); }
            }, (err) => console.error("Misc sync error", err));

            ['704', '804', '904', '隱藏回憶'].forEach(grade => {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', `memories_${grade}`);
                onSnapshot(colRef, (snapshot) => {
                    const list = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                    list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    memories[grade] = list;
                    if (window.currentBoard === grade && typeof window.renderBoardGrid === 'function') window.renderBoardGrid();
                }, (err) => console.error(`${grade} sync error`, err));
            });
        }

        async function saveSettings() { if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main'), siteSettings); }
        async function saveMisc() { if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'misc', 'content'), { videos: window.videos, capsules: window.capsules }); }

        window.uploadPhotos = async function() {
            const files = document.getElementById('photoFile').files;
            const desc = document.getElementById('photoDesc').value;
            const btn = document.getElementById('uploadBtn');
            
            if(!user) return alert("系統尚未就緒，請稍候");
            if(!files.length) return alert("請選擇照片");

            btn.disabled = true;
            btn.innerText = "處理中...";
            
            try {
                for(let f of files) {
                    if (f.size > 10 * 1024 * 1024) {
                        alert(`檔案 ${f.name} 太大了，請先縮小後再嘗試。`);
                        continue;
                    }

                    const rawUrl = await new Promise((res, rej) => {
                        const r = new FileReader(); 
                        r.onload = e => res(e.target.result); 
                        r.onerror = e => rej(e);
                        r.readAsDataURL(f);
                    });

                    const compressedUrl = await compressImage(rawUrl);
                    
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `memories_${window.currentBoard}`), {
                        url: compressedUrl, 
                        desc: desc || "青春回憶", 
                        timestamp: Date.now(), 
                        date: new Date().toLocaleDateString()
                    });
                }
                alert("上傳成功！");
            } catch (err) {
                console.error("Upload error:", err);
                alert("上傳失敗，可能是資料庫權限或圖片過大。");
            } finally {
                btn.disabled = false;
                btn.innerText = "上傳回憶";
                document.getElementById('photoFile').value = ''; 
                document.getElementById('photoDesc').value = '';
            }
        };

        window.deletePhoto = async function(docId) {
            if (user && confirm("確定要刪除嗎？")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `memories_${window.currentBoard}`, docId));
            }
        };

        window.siteSettings = siteSettings;
        window.memories = memories;
        window.videos = videos;
        window.capsules = capsules;
        window.saveSettings = saveSettings;
        window.saveMisc = saveMisc;
    </script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfcfd; scroll-behavior: smooth; color: #1e293b; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .hover-card { transition: all 0.4s ease; background: white; border-radius: 2rem; border: 1px solid #f1f5f9; }
        .hover-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.15); }
        .photo-frame { background: white; padding: 0.75rem 0.75rem 2.5rem 0.75rem; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .corkboard { background: #fdf6e3; background-image: radial-gradient(#dcd5c1 1px, transparent 0); background-size: 20px 20px; }
        .admin-section { display: none; }
        .is-admin .admin-section { display: block; }
        .admin-editable { cursor: pointer; }
        .is-admin .admin-editable:hover { background: rgba(99, 102, 241, 0.1); border-radius: 4px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 1rem; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="no-scrollbar">
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">

        <div class="relative z-10">
            <h1 id="siteTitle" class="serif text-5xl md:text-7xl font-black mb-6 admin-editable" onclick="editSiteText('siteTitle')">青春編年史</h1>
            <p id="siteSubtitle" class="text-indigo-200 text-lg md:text-xl italic admin-editable" onclick="editSiteText('siteSubtitle')">那些年，我們在 04 班一起度過的歲月</p>
        </div>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-24 reveal">
            <div class="group hover-card p-10 cursor-pointer" onclick="openBoard('704')">
                <div class="w-12 h-12 bg-blue-500 rounded-xl flex items-center justify-center text-white font-black mb-6 shadow-lg shadow-blue-200">7</div>
                <h3 id="card7Title" class="serif text-2xl font-bold mb-3 admin-editable" onclick="event.stopPropagation(); editSiteText('card7Title')">啟程：704</h3>
                <p id="card7Desc" class="text-slate-400 text-xs leading-relaxed admin-editable" onclick="event.stopPropagation(); editSiteText('card7Desc')">那年夏天，我們帶著青澀的笑容第一次遇見...</p>
            </div>
            <div class="group hover-card p-10 cursor-pointer" onclick="openBoard('804')">
                <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center text-white font-black mb-6 shadow-lg shadow-emerald-200">8</div>
                <h3 id="card8Title" class="serif text-2xl font-bold mb-3 admin-editable" onclick="event.stopPropagation(); editSiteText('card8Title')">熱血：804</h3>
                <p id="card8Desc" class="text-slate-400 text-xs leading-relaxed admin-editable" onclick="event.stopPropagation(); editSiteText('card8Desc')">操場上的吶喊、比賽的汗水，都是成長的印記...</p>
            </div>
            <div class="group hover-card p-10 cursor-pointer" onclick="openBoard('904')">
                <div class="w-12 h-12 bg-orange-500 rounded-xl flex items-center justify-center text-white font-black mb-6 shadow-lg shadow-orange-200">9</div>
                <h3 id="card9Title" class="serif text-2xl font-bold mb-3 admin-editable" onclick="event.stopPropagation(); editSiteText('card9Title')">承諾：904</h3>
                <p id="card9Desc" class="text-slate-400 text-xs leading-relaxed admin-editable" onclick="event.stopPropagation(); editSiteText('card9Desc')">最後的一年，所有的不捨都化作邁向未來的力量...</p>
            </div>
        </div>

        <section class="mb-24 reveal">
            <div class="flex items-center justify-between mb-10">
                <h2 class="serif text-4xl font-black text-slate-800">影像回顧館</h2>
                <button onclick="addVideoPrompt()" class="admin-section text-xs font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-lg">＋ 新增影片</button>
            </div>
            <div id="videoList" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
        </section>

        <section id="time-capsule" class="reveal mb-16">
            <div class="bg-indigo-900 rounded-[3rem] p-12 text-white overflow-hidden relative">
                <div class="absolute top-0 right-0 p-12 opacity-10 text-9xl">✉️</div>

                    <div class="lg:col-span-1">

                            <textarea id="capText" placeholder="想說的話..." rows="4" class="w-full bg-white/10 border border-white/20 rounded-xl px-5 py-3 text-sm outline-none focus:bg-white/20 resize-none"></textarea>
                            <button id="sendCapBtn" class="w-full bg-white text-indigo-900 font-black py-3 rounded-xl hover:bg-indigo-100 transition">寄出信件</button>

                    <div id="capsuleList" class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[500px] overflow-y-auto pr-4 no-scrollbar"></div>

                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-black text-xs">78</div>
                <p class="text-slate-400 text-xs font-bold tracking-[0.2em] uppercase">dcjhs 78th 11304 Copyright © / All rights reserved</p>
            </div>
        </div>
    </footer>

    <div id="boardModal" class="fixed inset-0 z-50 hidden bg-slate-900/95 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-6xl h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl">
            <div class="px-8 py-6 flex justify-between items-center bg-indigo-600 text-white">
                <h2 id="modalTitle" class="serif text-2xl font-black">回憶牆</h2>
                <button onclick="closeBoard()" class="w-10 h-10 hover:bg-white/20 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto corkboard p-8 md:p-12">
                <div class="admin-section mb-10 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex flex-col md:flex-row gap-4">
                        <input type="file" id="photoFile" accept="image/*" multiple class="text-xs file:bg-indigo-50 file:border-0 file:px-4 file:py-2 file:rounded-lg file:text-indigo-600 file:font-bold">
                        <input type="text" id="photoDesc" placeholder="這張照片的故事是..." class="flex-1 border-b border-slate-200 outline-none focus:border-indigo-500 py-2 text-sm">
                        <button id="uploadBtn" onclick="uploadPhotos()" class="bg-indigo-600 text-white px-8 py-2 rounded-lg font-bold text-sm">上傳回憶</button>
                    </div>
                </div>
                <div id="boardGrid" class="columns-1 md:columns-2 lg:columns-3 gap-8 space-y-8"></div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 z-[60] hidden bg-slate-950/90 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-3xl w-full max-w-xs text-center shadow-2xl">
            <h3 class="serif text-xl font-black mb-6 uppercase">管理員驗證</h3>
            <p id="loginMsg" class="text-rose-500 text-[10px] font-bold mb-4 h-4"></p>
            <input type="password" id="adminPass" placeholder="輸入通關密碼" class="w-full bg-slate-50 border rounded-xl p-4 text-center tracking-[0.5em] mb-6 outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="verifyBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition">驗證登入</button>
            <button id="cancelLoginBtn" class="mt-4 text-slate-400 text-[10px] font-bold uppercase">取消</button>
        </div>
    </div>

    <script>
        window.currentBoard = '704';

        const handleLogin = () => {
            const passInput = document.getElementById('adminPass');
            const msgEl = document.getElementById('loginMsg');
            const targetPass = 'admin04'; 

            if (passInput.value === targetPass) {
                msgEl.innerText = "";
                document.body.classList.add('is-admin');
                const loginBtn = document.getElementById('loginBtn');
                if (loginBtn) {
                    loginBtn.innerText = "目前模式：編輯中";
                    loginBtn.classList.add('text-indigo-600');
                }
                document.getElementById('loginModal').classList.add('hidden');
                passInput.value = "";
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                if (typeof window.updateUI === 'function') window.updateUI();
                if (typeof window.renderBoardGrid === 'function') window.renderBoardGrid();
            } else {
                msgEl.innerText = "驗證碼不正確";
                passInput.value = "";
                passInput.focus();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                document.getElementById('loginModal').classList.remove('hidden');
                setTimeout(() => document.getElementById('adminPass')?.focus(), 200);
            });
            document.getElementById('verifyBtn')?.addEventListener('click', handleLogin);
            document.getElementById('cancelLoginBtn')?.addEventListener('click', () => document.getElementById('loginModal').classList.add('hidden'));
            document.getElementById('adminPass')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                document.body.classList.remove('is-admin');
                const loginBtn = document.getElementById('loginBtn');
                if (loginBtn) {
                    loginBtn.innerText = "管理員登入";
                    loginBtn.classList.remove('text-indigo-600');
                }
                if (typeof window.renderBoardGrid === 'function') window.renderBoardGrid();
            });
            document.getElementById('sendCapBtn')?.addEventListener('click', window.saveCapsule);
        });

        window.renderVideos = function() {
            const list = document.getElementById('videoList');
            if (!list) return;
            const isAdmin = document.body.classList.contains('is-admin');
            list.innerHTML = window.videos.map(v => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div class="video-container"><iframe src="${v.url}" frameborder="0" allowfullscreen></iframe></div>
                    <div class="mt-4 flex justify-between items-center px-2">
                        <h4 class="serif font-bold text-slate-800">${v.title}</h4>
                        ${isAdmin ? `<button onclick="removeVideo('${v.id}')" class="text-rose-400 text-[10px] font-bold">刪除影片</button>` : ''}
                    </div>
                </div>
            `).join('');
        };

        window.renderCapsules = function() {
            const list = document.getElementById('capsuleList');
            if (!list) return;
            const isAdmin = document.body.classList.contains('is-admin');
            if (!window.capsules || window.capsules.length === 0) {
                list.innerHTML = '<p class="text-indigo-300 text-xs italic">尚無信件...</p>';
                return;
            }
            list.innerHTML = window.capsules.map(c => `
                <div class="bg-white/5 border border-white/10 p-6 rounded-2xl hover:bg-white/10 transition">
                    <p class="text-sm text-indigo-50 leading-relaxed mb-4 italic">"${c.text}"</p>
                    <div class="flex justify-between items-end border-t border-white/5 pt-4">
                        <div><p class="font-bold text-xs text-indigo-200">${c.name}</p><p class="text-[8px] text-indigo-400 opacity-60">${c.date}</p></div>
                        ${isAdmin ? `<button onclick="deleteCapsule('${c.id}')" class="text-rose-400 text-[8px] font-bold">移除</button>` : ''}
                    </div>
                </div>
            `).join('');
        };

        window.renderBoardGrid = function() {
            const grid = document.getElementById('boardGrid');
            if (!grid) return;
            const isAdmin = document.body.classList.contains('is-admin');
            const photos = window.memories[window.currentBoard] || [];
            if (photos.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-slate-400 serif py-20">等待你來填滿回憶...</p>`;
                return;
            }
            grid.innerHTML = photos.map(m => `
                <div class="photo-frame relative" style="transform: rotate(${(Math.random()*4-2).toFixed(1)}deg)">
                    <img src="${m.url}" class="w-full h-auto rounded-sm mb-3" loading="lazy">
                    <p class="text-[11px] font-medium text-slate-500 serif italic">${m.desc}</p>
                    <p class="text-[8px] text-slate-300 mt-1">${m.date}</p>
                    ${isAdmin ? `<button onclick="deletePhoto('${m.docId}')" class="absolute -top-2 -right-2 bg-rose-500 text-white w-6 h-6 rounded-full text-[10px] shadow-lg">✕</button>` : ''}
                </div>
            `).join('');
        };

        function editSiteText(key) {
            if(!document.body.classList.contains('is-admin')) return;
            const res = prompt("修改內容：", window.siteSettings[key]);
            if(res) { 
                window.siteSettings[key] = res; 
                if (typeof window.saveSettings === 'function') window.saveSettings(); 
            }
        }

        async function compressImage(base64Str) {
            return new Promise(res => {
                const img = new Image(); img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    res(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        }

        window.saveCapsule = async function() {
            const nEl = document.getElementById('capName'), tEl = document.getElementById('capText');
            if (!nEl || !tEl) return;
            const n = nEl.value.trim(), t = tEl.value.trim();
            if(!n || !t) return alert("請填寫名字和內容喔！");
            const newCapsule = { id: Date.now().toString(), name: n, text: t, date: new Date().toLocaleDateString() };
            window.capsules = [newCapsule, ...window.capsules];
            if (typeof window.saveMisc === 'function') await window.saveMisc();
            nEl.value = ''; tEl.value = '';
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
        };

        window.removeVideo = function(id) { window.videos = window.videos.filter(v => v.id.toString() !== id.toString()); if (typeof window.saveMisc === 'function') window.saveMisc(); };
        window.deleteCapsule = function(id) { window.capsules = window.capsules.filter(c => c.id.toString() !== id.toString()); if (typeof window.saveMisc === 'function') window.saveMisc(); };
        window.openBoard = function(grade) { window.currentBoard = grade; const mt = document.getElementById('modalTitle'); if(mt) mt.innerText = `${grade} 回憶牆`; document.getElementById('boardModal')?.classList.remove('hidden'); window.renderBoardGrid(); };
        window.closeBoard = function() { document.getElementById('boardModal')?.classList.add('hidden'); };
        window.addVideoPrompt = function() { const t = prompt("標題："), u = prompt("YouTube Embed URL："); if(t && u) { window.videos.push({ id: Date.now().toString(), title: t, url: u }); if (typeof window.saveMisc === 'function') window.saveMisc(); } };

        window.onload = () => {
            const obs = new IntersectionObserver(e => e.forEach(i => { if(i.isIntersecting) i.target.classList.add('active'); }));
            document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        };
    </script>
</body>
</html>
