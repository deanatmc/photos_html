```yaml
name: Keep Alive and Auto Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # 每天國際標準時間 00:00 自動執行
  workflow_dispatch:      # 讓你可以手動點擊按鈕測試

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 明確要求寫入權限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Make a small change to index.html
        run: |
          # 在 index.html 最後面加上一個隱藏的更新時間戳，確保檔案有變動
          echo "<!-- Last Auto Update: $(date) -->" >> index.html

      - name: Commit and Push
        run: |
          git add .
          git commit -m "Automated keep-alive update" || echo "No changes to commit"
          git push

```
