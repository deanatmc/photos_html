name: Keep Alive and Auto Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:      # 提供手動測試按鈕

jobs:
  update:
    runs-on: ubuntu-latest
    # 強制宣告權限，避免設定沒套用
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 確保取得完整歷史記錄

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update index.html
        run: |
          # 檢查 index.html 是否存在，並附加更新標籤
          if [ -f index.html ]; then
            echo "<!-- Refresh: $(date) -->" >> index.html
          fi

      - name: Commit and Push
        run: |
          git add index.html
          # 只有在有變動時才 commit，避免重複報錯
          git commit -m "chore: nightly keep-alive update" || exit 0
          git push origin main

